[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 8080
  port = 8888

[[redirects]]
  from = "/api/new-game"
  to = "/.netlify/functions/new-game"
  status = 200

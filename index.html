<!doctype html>
<html lang="nb" style="color-scheme: light dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Taksonomi</title>
    <meta
      name="description"
      content="Et ordspill hvor du kombinerer ord som hører til samme kategori."
    />
    <meta property="og:title" content="Taksonomi" />
    <meta
      property="og:description"
      content="Et ordspill hvor du kombinerer ord som hører til samme kategori."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0c1a14" />
    <script>
      // Apply a saved theme override before first paint so it survives reloads
      // without a flash. Key must match THEME_KEY in src/hooks/useTheme.ts.
      try {
        var t = localStorage.getItem("taksonomi:theme:v1");
        if (t === "light" || t === "dark") document.documentElement.style.colorScheme = t;
      } catch (e) {
      }
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Taksonomi" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
